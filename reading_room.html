<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>reading room</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Merriweather:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --cream:#f4efe5; --paper:#faf7f0; --text:#1a1a1a;
  --dim:rgba(26,26,26,.52); --faint:rgba(26,26,26,.30); --hair:rgba(26,26,26,.13);
  --sage:#4a6b54;
  --type:'Special Elite',cursive; --body:'Merriweather',serif;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--cream); color:var(--text);
  font-family:var(--body); font-weight:300; line-height:1.85;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding:clamp(24px,6vh,60px) 24px 60px;
}
.rr-wrap{max-width:760px; margin:0 auto}

.rr-back{
  display:inline-block; font-family:var(--type); font-size:.75rem; letter-spacing:.05em;
  color:var(--dim); text-decoration:none; margin-bottom:32px; transition:color .3s var(--ease);
}
.rr-back:hover{color:var(--text)}

.rr-title{font-family:var(--type); font-size:1.5rem; line-height:1.4; color:var(--text)}
.rr-meta{font-family:var(--body); font-style:italic; font-size:.9rem; color:var(--dim); margin-top:10px}

.rr-abstract{
  margin-top:28px; font-family:var(--body); font-size:.95rem; line-height:1.9; color:var(--text);
  white-space:pre-wrap;
}

.rr-note-section{margin-top:48px; padding-top:28px; border-top:1px solid var(--hair)}
.rr-note-title{
  font-family:var(--type); font-size:.75rem; letter-spacing:.08em; text-transform:uppercase;
  color:var(--dim); margin-bottom:14px;
}
.rr-note-body{
  white-space:pre-wrap; font-family:var(--body); font-size:.9rem; line-height:1.85; color:var(--text);
}

.rr-empty{font-family:var(--type); font-size:.8rem; color:var(--faint)}
.rr-loading{font-family:var(--type); font-size:.8rem; color:var(--faint)}
</style>
</head>
<body>

<div class="rr-wrap">
  <a href="dashboard.html" class="rr-back">&larr; back to the workshop</a>
  <div id="rr-content">
    <p class="rr-loading">loading&hellip;</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gvfcygdfjimmsrjakodo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sVgHLp9Kh_xeDuBqGWegow_lamYMIF2';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

async function loadPaper() {
  const params = new URLSearchParams(window.location.search);
  const key = params.get('key');
  const el = document.getElementById('rr-content');

  if (!key) {
    el.innerHTML = '<p class="rr-empty">no paper specified.</p>';
    return;
  }

  const { data: paper, error } = await db.from('papers').select('*').eq('zotero_key', key).single();

  if (error || !paper) {
    el.innerHTML = '<p class="rr-empty">paper not found.</p>';
    return;
  }

  // best-effort match to a linked Obsidian note by title —
  // there's no real foreign key between papers and notes yet,
  // so this is a placeholder match, not a guarantee.
  let noteHtml = '<p class="rr-empty">no linked note found yet.</p>';
  const titleFragment = (paper.title || '').slice(0, 40);
  if (titleFragment) {
    const { data: notes } = await db.from('notes').select('title,content').ilike('title', `%${titleFragment}%`).limit(1);
    if (notes && notes.length) {
      noteHtml = `<div class="rr-note-body">${escapeHtml(notes[0].content || '(empty note)')}</div>`;
    }
  }

  el.innerHTML = `
    <h1 class="rr-title">${escapeHtml(paper.title)}</h1>
    <p class="rr-meta">${escapeHtml((paper.authors || []).join(', '))}${paper.year ? ' &middot; ' + paper.year : ''}</p>
    <div class="rr-abstract">${escapeHtml(paper.abstract || '(no abstract synced from Zotero yet)')}</div>
    <div class="rr-note-section">
      <div class="rr-note-title">linked note</div>
      ${noteHtml}
    </div>
  `;
}

(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (!session) {
    window.location.href = 'dashboard.html';
    return;
  }
  loadPaper();
})();
</script>

</body>
</html>
