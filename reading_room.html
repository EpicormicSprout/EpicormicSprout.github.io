<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Room</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=GFS+Didot&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #09080a;
  --bg2: #0d0b0f;
  --amber: rgba(195,158,80,0.85);
  --amber-dim: rgba(195,158,80,0.35);
  --amber-faint: rgba(195,158,80,0.08);
  --verdigris: rgba(90,155,120,0.7);
  --verdigris-dim: rgba(90,155,120,0.3);
  --text: rgba(210,200,175,0.75);
  --text-dim: rgba(180,168,145,0.4);
  --border: rgba(200,175,120,0.1);
  --font-serif: 'GFS Didot', serif;
  --font-body: 'Newsreader', serif;
  --font-ui: 'Archivo', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ========================
   HEADER
   ======================== */
#header {
  height: 40px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 0;
  flex-shrink: 0;
  position: relative;
  z-index: 50;
}

/* Sun button */
#sun-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--amber-faint);
  border: 1px solid var(--amber-dim);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.2s;
  z-index: 5;
}

/* Slider panel */
#slider-panel {
  position: absolute;
  left: 8px; top: 50%;
  transform: translateY(-50%);
  width: 0; overflow: hidden;
  height: 34px;
  background: var(--bg2);
  border-radius: 17px;
  display: flex; align-items: center;
  z-index: 20;
  transition: width 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.2s;
  opacity: 0;
  border: 1px solid var(--border);
}

.slider-ghost { width: 32px; flex-shrink: 0; }

.slider-group {
  padding: 0 18px 0 6px;
  display: flex; flex-direction: column;
  gap: 5px;
  min-width: 250px;
}

.slider-row {
  display: flex; align-items: center; gap: 8px;
}

.slider-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber-dim);
  width: 44px;
}

.slider-track {
  flex: 1;
  position: relative;
  height: 2px;
  border-radius: 1px;
  overflow: hidden;
}

.slider-track input[type=range] {
  position: absolute;
  top: 50%; left: 0;
  transform: translateY(-50%);
  width: 100%; margin: 0;
  height: 2px;
  background: transparent;
  cursor: pointer;
  outline: none;
  -webkit-appearance: none;
  z-index: 2;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: #fff;
  border: 1.5px solid rgba(195,158,80,0.7);
  cursor: pointer;
  box-shadow: 0 0 3px rgba(0,0,0,0.4);
}
input[type=range]::-moz-range-thumb {
  width: 11px; height: 11px;
  border-radius: 50%;
  background: #fff;
  border: 1.5px solid rgba(195,158,80,0.7);
  cursor: pointer;
}

.bright-track { background: linear-gradient(to right, #000, #fff); }
.warm-track { background: linear-gradient(to right, #fff, #c39e50); }

/* Tabs */
.tabs { display: flex; align-items: center; gap: 2px; }

.tab {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: color 0.2s, background 0.2s, border-color 0.2s;
}
.tab.active {
  color: var(--amber);
  background: var(--amber-faint);
  border-color: var(--amber-dim);
}
.tab.inactive { color: var(--text-dim); }

.spacer { flex: 1; }

.header-link {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.2s;
}
.header-link:hover { color: var(--amber-dim); }

/* Divider between left and right panels */
#divider {
  position: absolute;
  left: 50%;
  top: 40px; bottom: 0;
  width: 1px;
  background: var(--border);
  z-index: 10;
}

/* ========================
   MAIN SPLIT
   ======================== */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ========================
   LEFT — PAPER
   ======================== */
#left {
  width: 50%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#paper-view {
  flex: 1;
  overflow-y: auto;
  padding: 36px 44px;
  transition: background 0.12s, color 0.12s;
  background: hsl(40, 8%, 94%);
  color: #1a1208;
  scrollbar-width: thin;
}

#paper-view::-webkit-scrollbar { width: 4px; }
#paper-view::-webkit-scrollbar-track { background: transparent; }
#paper-view::-webkit-scrollbar-thumb { background: rgba(195,158,80,0.2); border-radius: 2px; }

.paper-title-display {
  font-family: var(--font-serif);
  font-size: 1.6rem;
  line-height: 1.3;
  margin-bottom: 12px;
  color: inherit;
}

.paper-meta {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  opacity: 0.5;
  margin-bottom: 24px;
}

.paper-section-label {
  font-family: var(--font-ui);
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: 0.4;
  margin-bottom: 8px;
  margin-top: 24px;
}

.paper-abstract {
  font-family: var(--font-body);
  font-size: 0.88rem;
  line-height: 1.85;
  color: inherit;
}

.pdf-placeholder {
  margin-top: 28px;
  padding: 16px;
  border: 1px dashed;
  border-radius: 3px;
  opacity: 0.25;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-align: center;
}

/* Choose paper panel */
#choose-view {
  display: none;
  flex: 1;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

.choose-search {
  margin: 20px 24px 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 8px 0;
  outline: none;
  caret-color: var(--amber);
}
.choose-search::placeholder { color: var(--text-dim); }

#paper-list {
  flex: 1;
  overflow-y: auto;
  padding: 14px 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
}

.paper-item {
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.paper-item:hover {
  border-color: var(--amber-dim);
  background: var(--amber-faint);
}

.paper-item-title {
  font-family: var(--font-body);
  font-size: 0.82rem;
  color: var(--text);
  line-height: 1.5;
}

.paper-item-meta {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--amber-dim);
  letter-spacing: 0.08em;
  margin-top: 4px;
}

/* ========================
   RIGHT — NOTES
   ======================== */
#right {
  width: 50%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

#notes-header {
  height: 40px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
}

.notes-title {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.notes-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  padding: 3px 10px;
  border-radius: 3px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  white-space: nowrap;
}
.notes-btn:hover {
  border-color: var(--amber-dim);
  color: var(--amber);
}
.notes-btn.verdigris:hover {
  border-color: var(--verdigris-dim);
  color: var(--verdigris);
}

#save-status {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  color: var(--verdigris-dim);
  letter-spacing: 0.08em;
  min-width: 60px;
}

#notes-editor {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.note-section {
  margin-bottom: 24px;
}

.note-section-label {
  font-family: var(--font-ui);
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amber-dim);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.note-field {
  font-family: var(--font-body);
  font-size: 0.82rem;
  line-height: 1.8;
  color: var(--text);
  outline: none;
  min-height: 40px;
  width: 100%;
  caret-color: var(--amber);
}

.note-field:empty::before {
  content: attr(data-placeholder);
  color: var(--text-dim);
  font-style: italic;
  pointer-events: none;
}

.note-field:focus {
  background: rgba(195,158,80,0.02);
  border-radius: 2px;
}

.links-field {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--amber-dim);
  letter-spacing: 0.04em;
}

.no-paper-msg {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-family: var(--font-body);
  font-size: 0.8rem;
  color: var(--text-dim);
  font-style: italic;
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">

    <!-- Sun button -->
    <div id="sun-btn">
      <svg width="13" height="13" viewBox="0 0 128 128">
        <path d="M109.2,45.2V18.7H82.7L63.9,0L45.2,18.7H18.7v26.5L0,63.9l18.7,18.7v26.5h26.5l18.7,18.7l18.7-18.7h26.5V82.7l18.7-18.7L109.2,45.2z M66,96.3c-19.6,1.2-35.7-14.9-34.5-34.5c1-16.1,14.1-29.3,30.3-30.3C81.4,30.3,97.6,46.5,96.3,66C95.3,82.2,82.2,95.3,66,96.3z" fill="rgba(195,158,80,0.6)"/>
      </svg>
    </div>

    <!-- Slider panel -->
    <div id="slider-panel">
      <div class="slider-ghost"></div>
      <div class="slider-group">
        <div class="slider-row">
          <span class="slider-label">bright</span>
          <div class="slider-track bright-track">
            <input type="range" id="brightness" min="0" max="100" value="94" step="1">
          </div>
        </div>
        <div class="slider-row">
          <span class="slider-label">warmth</span>
          <div class="slider-track warm-track">
            <input type="range" id="warmth" min="0" max="100" value="10" step="1">
          </div>
        </div>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-reading" onclick="switchTab('reading')">reading</div>
      <div class="tab inactive" id="tab-choose" onclick="switchTab('choose')">choose paper</div>
    </div>

    <div class="spacer"></div>

    <a href="dashboard.html" class="header-link">← dashboard</a>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="divider"></div>

    <!-- LEFT -->
    <div id="left">

      <!-- Paper view -->
      <div id="paper-view">
        <div class="no-paper-msg" id="no-paper-msg">select a paper to begin</div>
        <div id="paper-content" style="display:none">
          <div class="paper-title-display" id="display-title"></div>
          <div class="paper-meta" id="display-meta"></div>
          <div class="paper-section-label">abstract</div>
          <div class="paper-abstract" id="display-abstract"></div>
          <div class="pdf-placeholder">pdf upload — coming soon</div>
        </div>
      </div>

      <!-- Choose paper view -->
      <div id="choose-view">
        <input class="choose-search" placeholder="search papers..." oninput="filterPapers(this.value)">
        <div id="paper-list"></div>
      </div>

    </div>

    <!-- RIGHT -->
    <div id="right">
      <div id="notes-header">
        <div class="notes-title" id="notes-title">no paper selected</div>
        <div id="save-status"></div>
        <button class="notes-btn verdigris" onclick="pushToCave()">push to cave</button>
        <button class="notes-btn" onclick="saveNote()">save</button>
      </div>

      <div id="notes-editor">
        <div class="no-paper-msg" id="no-note-msg">select a paper to load or create notes</div>
        <div id="note-content" style="display:none">
          <div class="note-section">
            <div class="note-section-label">summary</div>
            <div class="note-field" id="field-summary" contenteditable="true" data-placeholder="your summary..."></div>
          </div>
          <div class="note-section">
            <div class="note-section-label">key points</div>
            <div class="note-field" id="field-keypoints" contenteditable="true" data-placeholder="key points..."></div>
          </div>
          <div class="note-section">
            <div class="note-section-label">relevance to my work</div>
            <div class="note-field" id="field-relevance" contenteditable="true" data-placeholder="how this connects to your research..."></div>
          </div>
          <div class="note-section">
            <div class="note-section-label">questions and disagreements</div>
            <div class="note-field" id="field-questions" contenteditable="true" data-placeholder="what you're unsettled about..."></div>
          </div>
          <div class="note-section">
            <div class="note-section-label">links</div>
            <div class="note-field links-field" id="field-links" contenteditable="true" data-placeholder="[[concept]] [[person]] [[project]]"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://gvfcygdfjimmsrjakodo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sVgHLp9Kh_xeDuBqGWegow_lamYMIF2';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Auth check
const token = sessionStorage.getItem('dashboard_token');
if (!token) window.location.href = 'index.html';

// ========================
// SLIDER
// ========================
const sunBtn = document.getElementById('sun-btn');
const sliderPanel = document.getElementById('slider-panel');
const paperView = document.getElementById('paper-view');
const brightness = document.getElementById('brightness');
const warmth = document.getElementById('warmth');
let sliderOpen = false;

sunBtn.addEventListener('click', e => {
  e.stopPropagation();
  sliderOpen = true;
  sliderPanel.style.width = '310px';
  sliderPanel.style.opacity = '1';
  sunBtn.style.opacity = '0';
  sunBtn.style.pointerEvents = 'none';
});

document.addEventListener('click', e => {
  if (sliderOpen && !sliderPanel.contains(e.target)) {
    sliderOpen = false;
    sliderPanel.style.width = '0';
    sliderPanel.style.opacity = '0';
    setTimeout(() => { sunBtn.style.opacity = '1'; sunBtn.style.pointerEvents = 'auto'; }, 220);
  }
});

function updatePaperBg() {
  const b = parseInt(brightness.value);
  const w = parseInt(warmth.value);
  const hue = Math.round(42 * (w / 100));
  const sat = Math.round(w * 0.45);
  const light = b;
  const bg = `hsl(${hue},${sat}%,${light}%)`;
  const textL = b > 50 ? 8 : 92;
  const textS = b > 50 ? Math.round(sat * 0.3) : 5;
  paperView.style.background = bg;
  paperView.style.color = `hsl(${hue},${textS}%,${textL}%)`;
}
brightness.addEventListener('input', updatePaperBg);
warmth.addEventListener('input', updatePaperBg);
updatePaperBg();

// ========================
// TABS
// ========================
function switchTab(name) {
  const tabs = { reading: document.getElementById('tab-reading'), choose: document.getElementById('tab-choose') };
  const views = { reading: document.getElementById('paper-view'), choose: document.getElementById('choose-view') };

  Object.entries(tabs).forEach(([k, el]) => {
    el.className = k === name ? 'tab active' : 'tab inactive';
  });
  Object.entries(views).forEach(([k, el]) => {
    el.style.display = k === name ? (k === 'choose' ? 'flex' : 'block') : 'none';
  });

  if (name === 'choose') loadPapers();
}

// ========================
// PAPERS
// ========================
let allPapers = [];
let currentPaper = null;
let currentNote = null;

async function loadPapers() {
  const { data } = await db.from('papers').select('*').order('year', { ascending: false });
  allPapers = data || [];
  renderPapers(allPapers);
}

function renderPapers(list) {
  const el = document.getElementById('paper-list');
  if (!list.length) { el.innerHTML = '<div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim);padding:12px 0">no papers found</div>'; return; }
  el.innerHTML = list.map((p, i) => `
    <div class="paper-item" onclick="selectPaper(${i})">
      <div class="paper-item-title">${p.title}</div>
      <div class="paper-item-meta">${(p.authors || []).join(', ')}${p.year ? ' · ' + p.year : ''}</div>
    </div>
  `).join('');
}

function filterPapers(q) {
  if (!q) { renderPapers(allPapers); return; }
  renderPapers(allPapers.filter(p =>
    p.title.toLowerCase().includes(q.toLowerCase()) ||
    (p.authors || []).join(' ').toLowerCase().includes(q.toLowerCase())
  ));
}

async function selectPaper(idx) {
  currentPaper = allPapers[idx];
  switchTab('reading');

  document.getElementById('no-paper-msg').style.display = 'none';
  document.getElementById('paper-content').style.display = 'block';
  document.getElementById('display-title').textContent = currentPaper.title;
  document.getElementById('display-meta').textContent =
    [(currentPaper.authors || []).join(', '), currentPaper.year, currentPaper.publication].filter(Boolean).join(' · ');
  document.getElementById('display-abstract').textContent = currentPaper.abstract || 'No abstract available.';

  await loadNote(currentPaper);
}

// ========================
// NOTES
// ========================
async function loadNote(paper) {
  document.getElementById('notes-title').textContent = paper.title.slice(0, 60) + (paper.title.length > 60 ? '…' : '');

  const { data } = await db.from('notes')
    .select('*')
    .or(`title.ilike.%${paper.title.slice(0, 30)}%,path.ilike.%${paper.zotero_key || ''}%`)
    .limit(1);

  document.getElementById('no-note-msg').style.display = 'none';
  document.getElementById('note-content').style.display = 'block';

  if (data && data.length > 0) {
    currentNote = data[0];
    parseNoteIntoFields(data[0].content);
  } else {
    currentNote = null;
    clearNoteFields();
  }
}

function parseNoteIntoFields(content) {
  const sections = {
    summary: extractSection(content, 'Summary'),
    keypoints: extractSection(content, 'Key Points'),
    relevance: extractSection(content, 'Relevance to My Work'),
    questions: extractSection(content, 'Questions and Disagreements'),
    links: extractSection(content, 'Links'),
  };
  Object.entries(sections).forEach(([k, v]) => {
    const el = document.getElementById('field-' + k);
    if (el) el.textContent = v;
  });
}

function extractSection(content, heading) {
  const regex = new RegExp(`##?\\s*${heading}\\s*\\n([\\s\\S]*?)(?=##|$)`, 'i');
  const match = content?.match(regex);
  return match ? match[1].trim() : '';
}

function clearNoteFields() {
  ['summary','keypoints','relevance','questions','links'].forEach(k => {
    const el = document.getElementById('field-' + k);
    if (el) el.textContent = '';
  });
}

function buildNoteContent() {
  if (!currentPaper) return '';
  const g = id => document.getElementById('field-' + id)?.textContent?.trim() || '';
  return `title: ${currentPaper.title}
authors: ${(currentPaper.authors || []).join(', ')}
year: ${currentPaper.year || ''}
tags: literature

## Summary
${g('summary')}

## Key Points
${g('keypoints')}

## Relevance to My Work
${g('relevance')}

## Questions and Disagreements
${g('questions')}

## Links
${g('links')}`;
}

async function saveNote() {
  if (!currentPaper) return;
  const status = document.getElementById('save-status');
  status.textContent = 'saving...';
  const content = buildNoteContent();
  const title = currentPaper.title.slice(0, 80);

  if (currentNote) {
    await db.from('notes').update({ content, updated_at: new Date().toISOString() }).eq('id', currentNote.id);
  } else {
    const { data } = await db.from('notes').insert({ title, content, path: `Literature/${title}.md`, tags: ['literature'], updated_at: new Date().toISOString() }).select().single();
    currentNote = data;
  }
  status.textContent = 'saved';
  setTimeout(() => status.textContent = '', 2500);
}

async function pushToCave() {
  if (!currentPaper) return;
  const status = document.getElementById('save-status');
  await saveNote();
  status.textContent = 'pushing...';

  try {
    const content = buildNoteContent();
    const title = currentPaper.title.slice(0, 80);
    const response = await fetch(`${SUPABASE_URL}/functions/v1/cave-push`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content, path: `Literature/${title}.md` })
    });
    const data = await response.json();
    status.textContent = data.success ? 'pushed ✓' : 'push failed';
  } catch(e) {
    status.textContent = 'push failed';
  }
  setTimeout(() => status.textContent = '', 3000);
}
</script>
</body>
