<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=GFS+Didot&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ========================
   THEME
   ======================== */
:root {
  --bg: #f7f6f2;
  --bg2: #efede7;
  --bg3: #e8e5dc;
  --surface: rgba(255,255,255,0.72);
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.15);
  --text: #1a1814;
  --text-dim: rgba(26,24,20,0.45);
  --text-dimmer: rgba(26,24,20,0.25);
  --amber: #9a7a2e;
  --amber-bg: rgba(154,122,46,0.08);
  --amber-border: rgba(154,122,46,0.2);
  --verdigris: #2d6b52;
  --verdigris-bg: rgba(45,107,82,0.07);
  --accent: #9a7a2e;
  --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
  --font-serif: 'GFS Didot', serif;
  --font-body: 'Newsreader', serif;
  --font-ui: 'Archivo', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 12px;
  --header-h: 48px;
  --transition: 0.45s cubic-bezier(0.05, 0.61, 0.41, 0.95);
}

html.dark {
  --bg: #09080a;
  --bg2: #0d0b0f;
  --bg3: #121016;
  --surface: rgba(20,18,24,0.8);
  --border: rgba(200,175,120,0.1);
  --border-strong: rgba(200,175,120,0.2);
  --text: rgba(210,200,175,0.85);
  --text-dim: rgba(180,168,145,0.45);
  --text-dimmer: rgba(180,168,145,0.25);
  --amber: rgba(195,158,80,0.85);
  --amber-bg: rgba(195,158,80,0.07);
  --amber-border: rgba(195,158,80,0.2);
  --verdigris: rgba(90,155,120,0.7);
  --verdigris-bg: rgba(90,155,120,0.07);
  --accent: rgba(195,158,80,0.85);
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  transition: background 0.3s, color 0.3s;
}

/* ========================
   THEME TOGGLE
   ======================== */
.theme-toggle {
  --base-scale: 36px;
  --toggle-width: 5.625em;
  --toggle-height: 2.5em;
  --radius-pill: 100em;
  --sun-diameter: 2.125em;
  --sun-offset: calc((var(--toggle-height) - var(--sun-diameter)) / 2);
  --bg-toggle-light: #3d7eae;
  --bg-toggle-dark: #1d1f2c;
  --color-sun: #ecca2f;
  --color-moon: #c4c9d1;
  --color-crater: #959db1;
  --color-star: #fff;
  --color-cloud-front: #f3fdff;
  --color-cloud-back: #aacadf;
  --shadow-primary: rgba(0,0,0,0.25);
  --shadow-highlight: rgba(255,255,255,0.94);
  --halo-color: rgba(255,255,255,0.1);
  font-size: var(--base-scale);
  background: none;
  border: none;
  cursor: pointer;
}
.theme-toggle__container {
  width: var(--toggle-width);
  height: var(--toggle-height);
  background-color: var(--bg-toggle-light);
  border-radius: var(--radius-pill);
  cursor: pointer;
  position: relative;
  transition: background-color 0.3s ease;
  overflow: hidden;
  box-shadow: 0.06em 0.06em 0.125em var(--shadow-highlight);
}
html.dark .theme-toggle__container { background-color: var(--bg-toggle-dark); }
.theme-toggle__container::after {
  content: "";
  position: absolute;
  inset: 0;
  box-shadow: 0em 0.05em 0.187em rgba(0,0,0,0.5) inset;
  border-radius: var(--radius-pill);
  pointer-events: none;
}
.theme-toggle__sun {
  width: var(--sun-diameter);
  height: var(--sun-diameter);
  background-color: var(--color-sun);
  border-radius: 50%;
  position: absolute;
  top: var(--sun-offset);
  transform: translateX(var(--sun-offset));
  box-shadow: 0.05em 0.125em 0.125em var(--shadow-primary), 0em 0.05em 0.125em var(--shadow-primary), 0.05em 0.05em 0.05em 0em rgba(254,255,239,0.61) inset, 0em -0.05em 0.05em 0em #a1872a inset, 0 0 0 0.625em var(--halo-color), 0 0 0 1.25em var(--halo-color), 0 0 0 1.875em var(--halo-color);
  transition: transform 0.3s ease;
  overflow: hidden;
}
html.dark .theme-toggle__container .theme-toggle__sun {
  transform: translateX(calc(var(--toggle-width) - var(--sun-diameter) - var(--sun-offset)));
}
.theme-toggle__moon-mask {
  position: relative;
  width: 100%; height: 100%;
  background-color: var(--color-moon);
  border-radius: inherit;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  box-shadow: 0.062em 0.062em 0.062em 0em rgba(254,255,239,0.61) inset, 0em -0.062em 0.062em 0em #969696 inset;
}
html.dark .theme-toggle__container .theme-toggle__moon-mask { transform: translateX(0); }
.theme-toggle__crater {
  position: absolute;
  background-color: var(--color-crater);
  border-radius: 50%;
  box-shadow: 0em 0.03em 0.06em var(--shadow-primary) inset;
}
.theme-toggle__crater:nth-of-type(1) { top: 0.75em; left: 0.3em; width: 0.75em; height: 0.75em; }
.theme-toggle__crater:nth-of-type(2) { top: 0.9em; left: 1.375em; width: 0.375em; height: 0.375em; }
.theme-toggle__crater:nth-of-type(3) { top: 0.3em; left: 0.8em; width: 0.25em; height: 0.25em; }
.theme-toggle__stars {
  position: absolute;
  left: 0.3em;
  transform: translateY(-2em);
  transition: transform 0.3s ease;
  width: 2.75em;
  color: var(--color-star);
}
html.dark .theme-toggle__container .theme-toggle__stars { transform: translateY(0.5em); }
.theme-toggle__clouds {
  position: absolute;
  left: 0.3em;
  top: 2em;
  transform: translateY(0);
  width: 1.25em;
  height: 1.25em;
  background-color: var(--color-cloud-front);
  border-radius: 50%;
  box-shadow: 0.937em 0.312em var(--color-cloud-front), 1.437em 0.375em var(--color-cloud-front), 2.187em 0 var(--color-cloud-front), 2.937em 0.312em var(--color-cloud-front), 3.625em -0.062em var(--color-cloud-front), 4.5em -0.312em var(--color-cloud-front), 4.625em -1.75em 0 0.437em var(--color-cloud-front), -0.312em -0.312em var(--color-cloud-back), 0.5em -0.125em var(--color-cloud-back), 1.25em -0.062em var(--color-cloud-back), 2em -0.312em var(--color-cloud-back), 2.625em 0em var(--color-cloud-back), 3.375em -0.437em var(--color-cloud-back), 4em -0.625em var(--color-cloud-back), 4.125em -2.125em 0 0.437em var(--color-cloud-back);
  transition: transform 0.3s ease;
}
html.dark .theme-toggle__container .theme-toggle__clouds { transform: translateY(3em); }

/* ========================
   LAYOUT
   ======================== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
  gap: 16px;
  transition: background 0.3s, border-color 0.3s;
  z-index: 100;
}

.header-title {
  font-family: var(--font-serif);
  font-size: 0.95rem;
  color: var(--text-dim);
  letter-spacing: 0.04em;
}

.header-spacer { flex: 1; }

#clock {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-dimmer);
  letter-spacing: 0.1em;
}

/* ========================
   MAIN AREA
   ======================== */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ========================
   GRAPH BACKGROUND
   ======================== */
#graph-bg {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  left: 30%;
  opacity: 0.35;
  transition: opacity 0.3s;
}
canvas#graph-canvas {
  width: 100%;
  height: 100%;
}

/* ========================
   PANEL COLUMNS
   ======================== */
#panels {
  display: flex;
  flex-direction: row;
  gap: 10px;
  padding: 14px;
  position: relative;
  z-index: 10;
  width: 68%;
  height: 100%;
}

.col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: calc(33.33% - 7px);
  height: 100%;
}

/* ========================
   ACCORDION PANELS
   ======================== */
.panel {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: var(--transition);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  flex: 1;
  min-height: 48px;
}

.panel::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  border: 1px solid rgba(255,255,255,0.6);
  mask-image: linear-gradient(135deg, rgba(255,255,255,1), rgba(255,255,255,0) 55%);
  -webkit-mask-image: linear-gradient(135deg, rgba(255,255,255,1), rgba(255,255,255,0) 55%);
  pointer-events: none;
  z-index: 2;
}

html.dark .panel::before {
  border-color: rgba(255,255,255,0.12);
}

.panel::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  border: 1px solid var(--amber-border);
  mask-image: linear-gradient(135deg, rgba(255,255,255,0) 45%, rgba(255,255,255,1));
  -webkit-mask-image: linear-gradient(135deg, rgba(255,255,255,0) 45%, rgba(255,255,255,1));
  pointer-events: none;
  z-index: 2;
}

.panel.active {
  flex: 0 0 80%;
  cursor: default;
  box-shadow: var(--shadow-lg);
}

.panel-label {
  position: absolute;
  bottom: 10px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition);
  z-index: 5;
}

.panel.active .panel-label {
  bottom: auto;
  top: 14px;
  left: 14px;
}

.panel-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg);
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.panel-name {
  font-family: var(--font-ui);
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  white-space: nowrap;
  transition: var(--transition);
  opacity: 0;
}

.panel.active .panel-name { opacity: 1; }

/* Panel content */
.panel-content {
  position: absolute;
  inset: 0;
  padding: 52px 16px 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.panel.active .panel-content {
  opacity: 1;
  pointer-events: all;
  transition-delay: 0.2s;
}

/* ========================
   SHARED FIELD STYLES
   ======================== */
.field {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  padding: 7px 0;
  outline: none;
  caret-color: var(--accent);
}
.field::placeholder { color: var(--text-dimmer); }
.field:focus { border-bottom-color: var(--amber-border); }

textarea.field {
  resize: none;
  height: 70px;
  font-family: var(--font-body);
  font-size: 0.78rem;
  line-height: 1.6;
}

.small-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.small-btn:hover { border-color: var(--amber-border); color: var(--amber); }

/* ========================
   HAZEL
   ======================== */
#hazel-messages {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-right: 4px;
  margin-bottom: 10px;
  min-height: 0;
}

.msg { display: flex; flex-direction: column; max-width: 88%; }
.msg.user { align-self: flex-end; }
.msg.assistant { align-self: flex-start; }

.msg-bubble {
  font-family: var(--font-body);
  font-size: 0.78rem;
  line-height: 1.7;
  padding: 8px 12px;
  border-radius: 8px;
}
.msg.user .msg-bubble {
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  color: var(--amber);
}
.msg.assistant .msg-bubble {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
}

.msg-thinking {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-dimmer);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

.hazel-input-row {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

#hazel-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 7px 10px;
  outline: none;
  caret-color: var(--accent);
  transition: border-color 0.2s;
}
#hazel-input:focus { border-color: var(--amber-border); }
#hazel-input::placeholder { color: var(--text-dimmer); }

#hazel-send {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dimmer);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  padding: 7px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
#hazel-send:hover { border-color: var(--amber-border); color: var(--amber); }

/* ========================
   TASKS
   ======================== */
.task-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-body);
  font-size: 0.78rem;
  color: var(--text-dim);
  cursor: pointer;
}
.task-item::before { content: '◦'; color: var(--text-dimmer); }
.task-item.done { text-decoration: line-through; opacity: 0.4; }
.task-item.done::before { content: '✓'; color: var(--verdigris); }

/* ========================
   OBSIDIAN NOTES
   ======================== */
.note-item {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 6px;
  transition: border-color 0.2s, background 0.2s;
}
.note-item:hover { border-color: var(--amber-border); background: var(--amber-bg); }
.note-item-title {
  font-family: var(--font-serif);
  font-size: 0.82rem;
  color: var(--text);
}
.note-item-path {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-dimmer);
  margin-top: 2px;
}

/* ========================
   LEXICON
   ======================== */
.lex-result {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.lex-term {
  font-family: var(--font-serif);
  font-size: 0.9rem;
  color: var(--amber);
}
.lex-def {
  font-family: var(--font-body);
  font-size: 0.72rem;
  color: var(--text-dim);
  line-height: 1.55;
  font-style: italic;
  margin-top: 2px;
}

/* ========================
   WEATHER
   ======================== */
.weather-temp-big {
  font-family: var(--font-serif);
  font-size: 2.8rem;
  color: var(--text);
  line-height: 1;
}
.weather-desc-big {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--text-dim);
  font-style: italic;
  margin-top: 4px;
}
.weather-detail-row {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-dimmer);
  letter-spacing: 0.08em;
  margin-top: 8px;
}
.moon-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-family: var(--font-body);
  font-size: 0.72rem;
  color: var(--text-dim);
  font-style: italic;
}
.moon-emoji { font-size: 1.4rem; line-height: 1; }

/* ========================
   PAPERS
   ======================== */
.paper-item {
  padding: 9px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 6px;
  transition: border-color 0.2s, background 0.2s;
}
.paper-item:hover { border-color: var(--amber-border); background: var(--amber-bg); }
.paper-item-title {
  font-family: var(--font-body);
  font-size: 0.78rem;
  color: var(--text);
  line-height: 1.4;
}
.paper-item-meta {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  color: var(--text-dimmer);
  letter-spacing: 0.07em;
  margin-top: 3px;
}
.paper-open-btn {
  display: inline-block;
  margin-top: 5px;
  font-family: var(--font-mono);
  font-size: 0.52rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--amber);
  text-decoration: none;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.paper-open-btn:hover { opacity: 1; }

/* ========================
   ADD LEX FORM
   ======================== */
#add-lex-form {
  display: none;
  flex-direction: column;
  gap: 5px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
}
#add-lex-form.open { display: flex; }
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="header">
  <span class="header-title">Greetings</span>
  <div class="header-spacer"></div>
  <span id="clock"></span>

  <button class="theme-toggle" id="theme-toggle-btn" role="switch" aria-checked="false" aria-label="Switch to dark theme">
    <div class="theme-toggle__container">
      <div class="theme-toggle__clouds"></div>

// ========================
// GRAPH
// ========================
(function() {
  const canvas = document.getElementById('graph-canvas');
  const ctx = canvas.getContext('2d');
  let nodes = [], edges = [], W, H;

  function resize() {
    const el = document.getElementById('graph-bg');
    W = canvas.width = el.offsetWidth;
    H = canvas.height = el.offsetHeight;
  }

  function init() {
    nodes = []; edges = [];
    const count = 24;
    for (let i = 0; i < count; i++) {
      nodes.push({
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
        r: Math.random()*2.5+1.2, pulse: Math.random()*Math.PI*2,
        type: Math.random()>.7?'v':'a'
      });
    }
    for (let i = 0; i < count; i++)
      for (let j = i+1; j < count; j++)
        if (Math.random()<.1) edges.push([i,j]);
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    const dark = docEl.classList.contains('dark');
    const edgeColor = dark ? 'rgba(195,158,80,' : 'rgba(154,122,46,';

    edges.forEach(([a,b]) => {
      const na=nodes[a], nb=nodes[b];
      const dist=Math.hypot(na.x-nb.x, na.y-nb.y);
      const alpha=Math.max(0, 1-dist/260)*0.15;
      ctx.beginPath(); ctx.moveTo(na.x,na.y); ctx.lineTo(nb.x,nb.y);
      ctx.strokeStyle = edgeColor+alpha+')';
      ctx.lineWidth=0.5; ctx.stroke();
    });

    nodes.forEach(n => {
      n.pulse += 0.018;
      const glow = Math.sin(n.pulse)*.5+.5;
      const ca = n.type==='a' ? (dark?'195,158,80':'154,122,46') : (dark?'90,155,120':'45,107,82');
      if (glow>.25) {
        const gr = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*(5+glow*4));
        gr.addColorStop(0,`rgba(${ca},${glow*.12})`);
        gr.addColorStop(1,`rgba(${ca},0)`);
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r*(5+glow*4),0,Math.PI*2);
        ctx.fillStyle=gr; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${ca},${.35+glow*.45})`; ctx.fill();
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<0||n.x>W) n.vx*=-1;
      if(n.y<0||n.y>H) n.vy*=-1;
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', ()=>{ resize(); init(); });
  resize(); init(); draw();
})();

// ========================
// HAZEL
// ========================
let chatHistory = [];

function appendMsg(role, content) {
  const msgs = document.getElementById('hazel-messages');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-bubble">${content}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  chatHistory.push({role, content});
}

async function getContext(q) {
  let ctx = '';
  const [{data:notes},{data:papers},{data:terms}] = await Promise.all([
    db.from('notes').select('title,content').or(`title.ilike.%${q}%,content.ilike.%${q}%`).limit(2),
    db.from('papers').select('title,abstract').or(`title.ilike.%${q}%,abstract.ilike.%${q}%`).limit(2),
    db.from('terms').select('term,definition').or(`term.ilike.%${q}%,definition.ilike.%${q}%`).limit(2),
  ]);
  if (notes?.length) ctx += '\n\nNOTES:\n' + notes.map(n=>`[${n.title}]\n${n.content?.slice(0,400)}`).join('\n');
  if (papers?.length) ctx += '\n\nPAPERS:\n' + papers.map(p=>`[${p.title}]\n${p.abstract?.slice(0,300)}`).join('\n');
  if (terms?.length) ctx += '\n\nLEXICON:\n' + terms.map(t=>`[${t.term}] ${t.definition}`).join('\n');
  return ctx;
}

async function sendHazel() {
  const input = document.getElementById('hazel-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  appendMsg('user', q);

  const msgs = document.getElementById('hazel-messages');
  const thinking = document.createElement('div');
  thinking.className = 'msg assistant';
  thinking.innerHTML = '<div class="msg-thinking">...</div>';
  msgs.appendChild(thinking);
  msgs.scrollTop = msgs.scrollHeight;

  const ctx = await getContext(q);
  const system = `You are Hazel, a research assistant for C. S. Rowe, incoming PhD student in Cognitive and Information Sciences at UC Merced (advisor: Jeff Yoshimi, co-advisor: Chris Kello). Her work focuses on DANs, astrocyte-neuron coupling, and VEDA. Be terse, precise, and direct. No preamble. Match her register — sharp colleague, not assistant.${ctx?'\n\nContext from her knowledge base:'+ctx:''}`;

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/hazel`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({system, messages: chatHistory.filter(m=>m.role!=='system').slice(-10)})
    });
    const data = await res.json();
    thinking.remove();
    appendMsg('assistant', data?.content?.[0]?.text || data?.error?.message || 'no response');
  } catch(e) {
    thinking.remove();
    appendMsg('assistant', 'connection error');
  }
}

async function searchLex(q) {
  const el = document.getElementById('lex-results');
  if (!q) { el.innerHTML=''; return; }
  const [{data:termMatches},{data:defMatches}] = await Promise.all([
    db.from('terms').select('term,definition,etymology').ilike('term',`${q}%`).limit(6),
    db.from('terms').select('term,definition,etymology').ilike('definition',`%${q}%`).limit(6),
  ]);
  const seen = new Set((termMatches||[]).map(t=>t.term));
  const merged = [...(termMatches||[]), ...(defMatches||[]).filter(t=>!seen.has(t.term))].slice(0,10);
  el.innerHTML = merged.map(t=>`
    <div class="lex-result">
      <div class="lex-term">${t.term}</div>
      <div class="lex-def">${t.definition}</div>
    </div>
  `).join('') || `<div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dimmer)">no entries found</div>`;
}

function toggleAddLex() {
  const f = document.getElementById('add-lex-form');
  f.classList.toggle('open');
}

async function addLexEntry() {
  const term = document.getElementById('lex-new-term').value.trim();
  const def = document.getElementById('lex-new-def').value.trim();
  const etym = document.getElementById('lex-new-etym').value.trim();
  const status = document.getElementById('lex-status');
  if (!term||!def) { status.textContent='term + def required'; return; }
  const {error} = await db.from('terms').insert({term,definition:def,etymology:etym||null,date_added:new Date().toISOString().split('T')[0]});
  if (error) { status.textContent='error'; return; }
  status.textContent='added ✓';
  document.getElementById('lex-new-term').value='';
  document.getElementById('lex-new-def').value='';
  document.getElementById('lex-new-etym').value='';
  setTimeout(()=>status.textContent='',2500);
}

function getMoon() {
  const known = new Date(2000,0,6,18,14,0);
  const syn = 29.530588853;
  const pct = (((new Date()-known)/(1000*60*60*24))%syn+syn)%syn/syn;
  const phases=[{name:'New Moon',emoji:'🌑',min:0,max:.0625},{name:'Waxing Crescent',emoji:'🌒',min:.0625,max:.1875},{name:'First Quarter',emoji:'🌓',min:.1875,max:.3125},{name:'Waxing Gibbous',emoji:'🌔',min:.3125,max:.4375},{name:'Full Moon',emoji:'🌕',min:.4375,max:.5625},{name:'Waning Gibbous',emoji:'🌖',min:.5625,max:.6875},{name:'Last Quarter',emoji:'🌗',min:.6875,max:.8125},{name:'Waning Crescent',emoji:'🌘',min:.8125,max:1}];
  return phases.find(p=>pct>=p.min&&pct<p.max)||phases[0];
}
loadWeather();

async function searchPapers(q) {
  const el = document.getElementById('paper-results');
  const qr = q
    ? db.from('papers').select('*').or(`title.ilike.%${q}%,abstract.ilike.%${q}%`).limit(10)
    : db.from('papers').select('*').order('year',{ascending:false}).limit(10);
  const {data} = await qr;
  el.innerHTML = (data||[]).map(p=>`
    <div class="paper-item">
      <div class="paper-item-title">${p.title}</div>
      <div class="paper-item-meta">${(p.authors||[]).join(', ')}${p.year?' · '+p.year:''}</div>
      <a href="reading_room.html?key=${p.zotero_key}" class="paper-open-btn">open in reading room →</a>
    </div>
  `).join('');
}
searchPapers('');
