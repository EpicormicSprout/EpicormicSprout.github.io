/* ========================
   MAIN LAYOUT
   ======================== */
#dashboard {
  display: grid;
  grid-template-columns: 1fr 3fr 1fr;
  grid-template-rows: auto 1fr;
  height: 100vh;
  gap: 0;
  padding: 16px;
  gap: 12px;
}

/* ========================
   HEADER
   ======================== */
#header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px 8px;
  border-bottom: 1px solid var(--border);
}

.header-title {
  font-family: var(--font-serif);
  font-size: 1rem;
  color: var(--amber-dim);
  letter-spacing: 0.08em;
}

.header-time {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.12em;

  border-radius: inherit;
  content: "";

  position: absolute;

  border: 1px solid rgba(255,255,255,0.85);
  mask-image: linear-gradient(135deg, rgba(255,255,255,1), rgba(255,255,255,0) 55%);

}

/* Bottom-right refraction edge */

  border-radius: inherit;
  content: "";
  display: block;
  position: absolute;
  inset: 0;
  border: 1px solid rgba(195,158,80,0.5);
  mask-image: linear-gradient(135deg, rgba(255,255,255,0) 45%, rgba(255,255,255,1));

// ============================================================
// SUPABASE
// ============================================================
const SUPABASE_URL = 'https://gvfcygdfjimmsrjakodo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sVgHLp9Kh_xeDuBqGWegow_lamYMIF2';

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) +
    ' — ' +
    now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
}
updateClock();
setInterval(updateClock, 1000);

// ============================================================
// GRAPH — placeholder animated node network
// ============================================================
(function() {
  const canvas = document.getElementById('graph-canvas');
  const ctx = canvas.getContext('2d');
  let nodes = [], edges = [], W, H, animId;

  function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }

  function init() {
    nodes = [];
    edges = [];
    const count = 28;
    for (let i = 0; i < count; i++) {
      nodes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 3 + 1.5,
        pulse: Math.random() * Math.PI * 2,
        type: Math.random() > 0.7 ? 'verdigris' : 'amber'
      });
    }
    for (let i = 0; i < count; i++) {
      for (let j = i + 1; j < count; j++) {
        if (Math.random() < 0.12) edges.push([i, j]);
      }
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);

    edges.forEach(([a, b]) => {
      const na = nodes[a], nb = nodes[b];
      const dist = Math.hypot(na.x - nb.x, na.y - nb.y);
      const alpha = Math.max(0, 1 - dist / 280) * 0.18;
      ctx.beginPath();
      ctx.moveTo(na.x, na.y);
      ctx.lineTo(nb.x, nb.y);
      ctx.strokeStyle = `rgba(195,158,80,${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    });

    nodes.forEach(n => {
      n.pulse += 0.02;
      const glow = Math.sin(n.pulse) * 0.5 + 0.5;
      const color = n.type === 'amber' ? '195,158,80' : '90,155,120';

      if (glow > 0.3) {
        const gr = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * (6 + glow * 4));
        gr.addColorStop(0, `rgba(${color},${glow * 0.15})`);
        gr.addColorStop(1, `rgba(${color},0)`);
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * (6 + glow * 4), 0, Math.PI * 2);
        ctx.fillStyle = gr;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${color},${0.4 + glow * 0.5})`;
      ctx.fill();

      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    });

    animId = requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); init(); });
  resize(); init(); draw(0);
})();

    papers: buildPapers,
    lexicon: buildLexicon,
    weather: buildWeather,
    tasks: buildTasks,
  };

  title.textContent = {
    cb1v1: 'Hazel', papers: 'Papers', lexicon: 'Words',
    weather: 'Weather', tasks: 'Today'
  }[name] || name;

  // Show/hide + term button
  const addBtn = document.getElementById('panel-add-btn');
  if (name === 'lexicon') {
    addBtn.style.display = 'inline-block';
  } else {
    addBtn.style.display = 'none';
    document.getElementById('add-term-form').style.display = 'none';
  }

  content.innerHTML = '';
  if (panels[name]) panels[name](content);
}

function closePanel() {
  currentPanel = null;
  document.getElementById('center-panel').classList.remove('visible');
  document.getElementById('center-default').style.opacity = '1';
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
}

// ============================================================
// CB1V1
// ============================================================
let chatHistory = [];

function buildCB1V1(container) {
  container.innerHTML = `
    <div id="cb1v1-messages" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-right:4px;"></div>
    <div id="cb1v1-input-row">
      <input id="cb1v1-input" placeholder="..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button id="cb1v1-send" onclick="sendMessage()">send →</button>
    </div>
  `;

  if (chatHistory.length === 0) {
    appendMessage('assistant', 'Inquire within.');
  } else {
    const msgs = document.getElementById('cb1v1-messages');
    chatHistory.forEach(m => {
      const div = buildMsgEl(m.role, m.content);
      msgs.appendChild(div);
    });
  }
}

function buildMsgEl(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-bubble">${content}</div>`;
  return div;
}

function appendMessage(role, content) {
  const msgs = document.getElementById('cb1v1-messages');
  if (!msgs) return;
  const el = buildMsgEl(role, content);
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  chatHistory.push({ role, content });
}

async function getContext(query) {
  let context = '';

  // Search notes
  const { data: notes } = await db.from('notes')
    .select('title, content')
    .or(`title.ilike.%${query}%,content.ilike.%${query}%`)
    .limit(3);

  if (notes && notes.length > 0) {
    context += '\n\n--- OBSIDIAN NOTES ---\n';
    notes.forEach(n => {
      context += `\n[${n.title}]\n${n.content?.slice(0, 500)}...\n`;
    });
  }

  // Search papers
  const { data: papers } = await db.from('papers')
    .select('title, authors, abstract, year')
    .or(`title.ilike.%${query}%,abstract.ilike.%${query}%`)
    .limit(3);

  if (papers && papers.length > 0) {
    context += '\n\n--- ZOTERO PAPERS ---\n';
    papers.forEach(p => {
      context += `\n[${p.title} (${p.year})]\nAuthors: ${p.authors?.join(', ')}\n${p.abstract?.slice(0, 400)}...\n`;
    });
  }

  // Search lexicon
  const { data: terms } = await db.from('terms')
    .select('term, definition, etymology')
    .or(`term.ilike.%${query}%,definition.ilike.%${query}%`)
    .limit(3);

  if (terms && terms.length > 0) {
    context += '\n\n--- STERLING LEXICON ---\n';
    terms.forEach(t => {
      context += `\n[${t.term}]\n${t.definition}\n`;
    });
  }

  return context;
}

async function sendMessage() {
  const input = document.getElementById('cb1v1-input');
  const query = input.value.trim();
  if (!query) return;
  input.value = '';

  appendMessage('user', query);

  const msgs = document.getElementById('cb1v1-messages');
  const thinking = document.createElement('div');
  thinking.className = 'msg assistant';
  thinking.innerHTML = '<div class="msg-thinking">...</div>';
  msgs.appendChild(thinking);
  msgs.scrollTop = msgs.scrollHeight;

  const context = await getContext(query);

  const systemPrompt = `You are CB1V1, a research assistant for C. S. Sterling, an incoming PhD student in Cognitive and Information Sciences at UC Merced. You have deep knowledge of her research program.

Her work focuses on Dynamical Associative Networks (DANs), astrocyte-neuron computational coupling, and VEDA (Virtual Embodied Dynamic Associations) — an embodied cognitive architecture combining DANs with astrocyte dynamics in a 3D virtual world.

Key concepts: moduli (her coined term for irreducible remainders of experience), the Sterling Lexicon (her personal philosophical terminology), neurophenomenology, Hebbian learning, discrete-time calcium oscillation dynamics, binary connection weights.

Her intellectual lineage runs through Jonathan Shear, Jeff Yoshimi (primary PhD advisor, UC Merced), Anthony Beavers (DAN collaborator at Indiana University), and the neurophenomenological tradition of Varela and Husserl.

Be precise, intellectually serious, and match her register. You may reference her coined terms naturally.

${context ? 'Here is relevant context from her personal knowledge base:' + context : ''}`;

  try {
    const response = await fetch('https://gvfcygdfjimmsrjakodo.supabase.co/functions/v1/hazel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: systemPrompt,
        messages: chatHistory.filter(m => m.role !== 'system').slice(-10)
      })
    });

    const data = await response.json();
    thinking.remove();

    console.log('Hazel response:', JSON.stringify(data));
    const reply = data.content?.[0]?.text || data.error || 'No response.';
    appendMessage('assistant', reply);

  } catch (e) {
    thinking.remove();
    appendMessage('assistant', 'Connection error. Please try again.');
  }
}

async function buildLexicon(container) {
  container.style.overflow = 'hidden';
  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  container.innerHTML = `
    <div style="flex-shrink:0;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px">
      <input class="mini-search" id="lex-search" placeholder="search terms..." oninput="lexSearch(this.value)" style="font-size:0.9rem;padding:8px 0;width:100%">
    </div>
    <div id="lex-results" style="flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;display:flex;flex-direction:column;gap:10px;padding-right:4px"></div>
  `;

function toggleAddTerm() {
  const form = document.getElementById('add-term-form');
  const btn = document.getElementById('panel-add-btn');
  const visible = form.style.display === 'flex';
  form.style.display = visible ? 'none' : 'flex';
  btn.style.color = visible ? 'var(--amber-dim)' : 'var(--amber)';
  btn.style.borderColor = visible ? 'var(--border)' : 'var(--amber-dim)';
}

async function addLexEntry() {
  const term = document.getElementById('lex-new-term').value.trim();
  const def = document.getElementById('lex-new-def').value.trim();
  const etym = document.getElementById('lex-new-etym').value.trim();
  const source = document.getElementById('lex-new-source').value.trim();
  const status = document.getElementById('lex-add-status');

  if (!term || !def) {
    status.textContent = 'term and definition required';
    status.style.color = 'rgba(195,80,80,0.6)';
    return;
  }

  const { error } = await db.from('terms').insert({
    term,
    definition: def,
    etymology: etym || null,
    source: source || null,
    date_added: new Date().toISOString().split('T')[0]
  });

  if (error) {
    status.textContent = 'error — ' + error.message;
    status.style.color = 'rgba(195,80,80,0.6)';
  } else {
    status.textContent = 'entry added';
    status.style.color = 'var(--verdigris-dim)';
    document.getElementById('lex-new-term').value = '';
    document.getElementById('lex-new-def').value = '';
    document.getElementById('lex-new-etym').value = '';
    document.getElementById('lex-new-source').value = '';
    lexSearch('');
    setTimeout(() => status.textContent = '', 3000);
  }
}

async function lexSearch(query) {
  const resultsEl = document.getElementById('lex-results');
  if (!resultsEl) return;

  if (!query) {
    const { data } = await db.from('terms').select('term, definition, etymology, source').order('term').limit(20);
    renderLexResults(resultsEl, data);
    return;
  }

  // Run term-first search, then definition search separately
  const [{ data: termMatches }, { data: defMatches }] = await Promise.all([
    db.from('terms').select('term, definition, etymology, source').ilike('term', `${query}%`).limit(8),
    db.from('terms').select('term, definition, etymology, source').ilike('definition', `%${query}%`).limit(8)
  ]);

  // Merge — term matches first, then definition matches not already in results
  const seen = new Set((termMatches || []).map(t => t.term));
  const merged = [
    ...(termMatches || []),
    ...(defMatches || []).filter(t => !seen.has(t.term))
  ].slice(0, 12);

  renderLexResults(resultsEl, merged);
}

function renderLexResults(el, data) {
  if (!data || data.length === 0) {
    el.innerHTML = `<div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim)">no entries found</div>`;
    return;
  }
  el.innerHTML = data.map(t => `
    <div class="lex-entry">
      <div class="lex-term">${t.term}</div>
      ${t.etymology ? `<div class="lex-etym">${t.etymology}</div>` : ''}
      <div class="lex-def">${t.definition}</div>
    </div>
  `).join('');
}

async function miniLexSearch(query) {
  const el = document.getElementById('lexicon-mini-results');
  if (!el) return;
  if (!query) { el.innerHTML = ''; return; }
  const { data } = await db.from('terms')
    .select('term, definition')
    .ilike('term', `${query}%`)
    .limit(3);
  if (!data) return;
  el.innerHTML = data.map(t => `
    <div class="mini-note" style="margin-top:4px">
      <span style="color:var(--amber-dim)">${t.term}</span> — ${t.definition?.slice(0, 60)}...
    </div>
  `).join('');
}

// ============================================================
async function loadWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.8021&longitude=-124.1637&current=temperature_2m,weathercode,windspeed_10m,relative_humidity_2m&temperature_unit=fahrenheit&windspeed_unit=mph');
    const data = await res.json();
    const c = data.current;
    const temp = Math.round(c.temperature_2m);
    const desc = weatherDesc(c.weathercode);
    document.getElementById('w-temp').textContent = `${temp}°F`;
    document.getElementById('w-desc').textContent = desc;
    document.getElementById('w-detail').textContent = `wind ${Math.round(c.windspeed_10m)}mph · humidity ${c.relative_humidity_2m}%`;

    // Moon phase
    const moon = getMoonPhase();
    document.getElementById('w-moon-phase').textContent = moon.emoji;
    document.getElementById('w-moon-name').textContent = moon.name;
  } catch(e) {
    document.getElementById('w-desc').textContent = 'unavailable';
  }
}

function getMoonPhase() {
  const now = new Date();
  const known = new Date(2000, 0, 6, 18, 14, 0); // known new moon
  const synodic = 29.530588853; // days
  const diff = (now - known) / (1000 * 60 * 60 * 24);
  const phase = ((diff % synodic) + synodic) % synodic;
  const pct = phase / synodic;

  const phases = [
    { name: 'New Moon',        emoji: '🌑', min: 0,     max: 0.0625 },
    { name: 'Waxing Crescent', emoji: '🌒', min: 0.0625, max: 0.1875 },
    { name: 'First Quarter',   emoji: '🌓', min: 0.1875, max: 0.3125 },
    { name: 'Waxing Gibbous',  emoji: '🌔', min: 0.3125, max: 0.4375 },
    { name: 'Full Moon',       emoji: '🌕', min: 0.4375, max: 0.5625 },
    { name: 'Waning Gibbous',  emoji: '🌖', min: 0.5625, max: 0.6875 },
    { name: 'Last Quarter',    emoji: '🌗', min: 0.6875, max: 0.8125 },
    { name: 'Waning Crescent', emoji: '🌘', min: 0.8125, max: 0.9375 },
    { name: 'New Moon',        emoji: '🌑', min: 0.9375, max: 1.0    },
  ];

  return phases.find(p => pct >= p.min && pct < p.max) || phases[0];
}

function weatherDesc(code) {
  const map = {0:'clear sky',1:'mainly clear',2:'partly cloudy',3:'overcast',45:'fog',48:'icy fog',51:'light drizzle',53:'drizzle',55:'heavy drizzle',61:'light rain',63:'rain',65:'heavy rain',71:'light snow',73:'snow',75:'heavy snow',80:'rain showers',81:'showers',82:'heavy showers',95:'thunderstorm'};
  return map[code] || 'variable';
}

function buildWeather(container) {
  container.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:16px;align-items:center;justify-content:center;height:100%">
      <div class="weather-temp" id="wp-temp" style="font-size:5rem">${document.getElementById('w-temp').textContent}</div>
      <div class="weather-desc" style="font-size:1rem">${document.getElementById('w-desc').textContent}</div>
      <div class="weather-detail">${document.getElementById('w-detail').textContent}</div>
      <div style="font-family:var(--font-mono);font-size:0.58rem;color:var(--text-dim);letter-spacing:0.1em">Eureka, California</div>
    </div>
  `;
}

// ============================================================
// TASKS
// ============================================================
let tasks = JSON.parse(localStorage.getItem('cb1v1-tasks') || '[]');

function saveTasks() { localStorage.setItem('cb1v1-tasks', JSON.stringify(tasks)); }

function renderTasksMini() {
  const el = document.getElementById('tasks-list-mini');
  if (!el) return;
  el.innerHTML = tasks.slice(0, 4).map((t, i) => `
    <div class="task-item ${t.done ? 'done' : ''}" onclick="toggleTask(${i});event.stopPropagation()" ondblclick="deleteTask(${i});event.stopPropagation()" title="double-click to remove">${t.text}</div>
  `).join('');
}

function quickAddTask(e) {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  if (!val) return;
  tasks.unshift({ text: val, done: false });
  saveTasks(); renderTasksMini();
  e.target.value = '';
  e.stopPropagation();
}

function toggleTask(i) {
  tasks[i].done = !tasks[i].done;
  saveTasks(); renderTasksMini();
  if (currentPanel === 'tasks') buildTasks(document.getElementById('panel-content'));
}

function deleteTask(i) {
  tasks.splice(i, 1);
  saveTasks(); renderTasksMini();
  if (currentPanel === 'tasks') buildTasks(document.getElementById('panel-content'));
}

function buildTasks(container) {
  container.innerHTML = `
    <input class="mini-search" id="task-panel-input" placeholder="add a task..." style="font-size:0.85rem;padding:10px 0;margin-bottom:12px" onkeydown="addTaskFromPanel(event)">
    <div id="task-panel-list"></div>
  `;
  renderTasksPanel();
}

function renderTasksPanel() {
  const el = document.getElementById('task-panel-list');
  if (!el) return;
  el.innerHTML = tasks.map((t, i) => `
    <div class="task-item ${t.done ? 'done' : ''}" onclick="toggleTask(${i})" ondblclick="deleteTask(${i})" title="double-click to remove" style="font-size:0.82rem;padding:10px 0">${t.text}</div>
  `).join('') || `<div style="font-family:var(--font-body);font-size:0.75rem;color:var(--text-dim);font-style:italic;margin-top:20px">no tasks yet</div>`;
}

function addTaskFromPanel(e) {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  if (!val) return;
  tasks.unshift({ text: val, done: false });
  saveTasks(); renderTasksMini(); renderTasksPanel();
  e.target.value = '';
}
