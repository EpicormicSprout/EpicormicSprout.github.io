<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --frost-bg: rgba(255,255,255,0.55);
  --frost-border: rgba(255,255,255,0.7);
  --text: #1a1a14;
  --text-dim: rgba(26,26,20,0.5);
  --text-dimmer: rgba(26,26,20,0.3);
  --accent: #2d5a3d;
  --accent2: #1a3d4f;
  --border: rgba(255,255,255,0.4);
  --font-serif: 'GFS Didot', serif;
  --font-body: 'Newsreader', serif;
  --font-mono: 'JetBrains Mono', monospace;
  --gap: 10px;
  --edge: 10px;
  --radius: 28px;
  --transition: 0.55s cubic-bezier(0.05, 0.61, 0.41, 0.95);
}

html.dark {
  --frost-bg: rgba(8,7,10,0.62);
  --frost-border: rgba(255,255,255,0.12);
  --text: rgba(220,210,190,0.9);
  --text-dim: rgba(200,190,170,0.5);
  --text-dimmer: rgba(200,190,170,0.28);
  --accent: #6aaa82;
  --accent2: #5a9ab0;
  --border: rgba(255,255,255,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #e8e4dc;
  transition: background 0.3s;
}

html.dark body { background: #07060a; }

/* ========================
   THEME TOGGLE
   ======================== */
.theme-toggle {
  --base-scale: 22px;
  --toggle-width: 5.625em;
  --toggle-height: 2.5em;
  --radius-pill: 100em;
  --sun-diameter: 2.125em;
  --sun-offset: calc((var(--toggle-height) - var(--sun-diameter)) / 2);
  --bg-toggle-light: #3d7eae;
  --bg-toggle-dark: #1d1f2c;
  --color-sun: #ecca2f;
  --color-moon: #c4c9d1;
  --color-crater: #959db1;
  --color-star: #fff;
  --color-cloud-front: #f3fdff;
  --color-cloud-back: #aacadf;
  --shadow-primary: rgba(0,0,0,0.25);
  --shadow-highlight: rgba(255,255,255,0.94);
  --halo-color: rgba(255,255,255,0.1);
  font-size: var(--base-scale);
  background: none;
  border: none;
  cursor: pointer;
  position: fixed;
  top: 18px;
  left: 22px;
  z-index: 1000;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
}
.theme-toggle__container {
  width: var(--toggle-width);
  height: var(--toggle-height);
  background-color: var(--bg-toggle-light);
  border-radius: var(--radius-pill);
  cursor: pointer;
  position: relative;
  transition: background-color 0.3s ease;
  overflow: hidden;
  box-shadow: 0.06em 0.06em 0.125em var(--shadow-highlight);
}
html.dark .theme-toggle__container { background-color: var(--bg-toggle-dark); }
.theme-toggle__container::after {
  content: "";
  position: absolute; inset: 0;
  box-shadow: 0em 0.05em 0.187em rgba(0,0,0,0.5) inset;
  border-radius: var(--radius-pill);
  pointer-events: none;
}
.theme-toggle__sun {
  width: var(--sun-diameter); height: var(--sun-diameter);
  background-color: var(--color-sun);
  border-radius: 50%;
  position: absolute;
  top: var(--sun-offset);
  transform: translateX(var(--sun-offset));
  box-shadow: 0.05em 0.125em 0.125em var(--shadow-primary), 0em 0.05em 0.125em var(--shadow-primary), 0.05em 0.05em 0.05em 0em rgba(254,255,239,0.61) inset, 0em -0.05em 0.05em 0em #a1872a inset, 0 0 0 0.625em var(--halo-color), 0 0 0 1.25em var(--halo-color), 0 0 0 1.875em var(--halo-color);
  transition: transform 0.3s ease;
  overflow: hidden;
}
html.dark .theme-toggle__container .theme-toggle__sun {
  transform: translateX(calc(var(--toggle-width) - var(--sun-diameter) - var(--sun-offset)));
}
.theme-toggle__moon-mask {
  position: relative; width: 100%; height: 100%;
  background-color: var(--color-moon);
  border-radius: inherit;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  box-shadow: 0.062em 0.062em 0.062em 0em rgba(254,255,239,0.61) inset, 0em -0.062em 0.062em 0em #969696 inset;
}
html.dark .theme-toggle__container .theme-toggle__moon-mask { transform: translateX(0); }
.theme-toggle__crater {
  position: absolute; background-color: var(--color-crater);
  border-radius: 50%;
  box-shadow: 0em 0.03em 0.06em var(--shadow-primary) inset;
}
.theme-toggle__crater:nth-of-type(1) { top:.75em; left:.3em; width:.75em; height:.75em; }
.theme-toggle__crater:nth-of-type(2) { top:.9em; left:1.375em; width:.375em; height:.375em; }
.theme-toggle__crater:nth-of-type(3) { top:.3em; left:.8em; width:.25em; height:.25em; }
.theme-toggle__stars {
  position: absolute; left:.3em;
  transform: translateY(-2em);
  transition: transform 0.3s ease;
  width: 2.75em; color: var(--color-star);
}
html.dark .theme-toggle__container .theme-toggle__stars { transform: translateY(0.5em); }
.theme-toggle__clouds {
  position: absolute; left:.3em; top:2em;
  transform: translateY(0);
  width:1.25em; height:1.25em;
  background-color: var(--color-cloud-front);
  border-radius: 50%;
  box-shadow: 0.937em 0.312em var(--color-cloud-front), 1.437em 0.375em var(--color-cloud-front), 2.187em 0 var(--color-cloud-front), 2.937em 0.312em var(--color-cloud-front), 3.625em -0.062em var(--color-cloud-front), 4.5em -0.312em var(--color-cloud-front), 4.625em -1.75em 0 0.437em var(--color-cloud-front), -0.312em -0.312em var(--color-cloud-back), 0.5em -0.125em var(--color-cloud-back), 1.25em -0.062em var(--color-cloud-back), 2em -0.312em var(--color-cloud-back), 2.625em 0em var(--color-cloud-back), 3.375em -0.437em var(--color-cloud-back), 4em -0.625em var(--color-cloud-back), 4.125em -2.125em 0 0.437em var(--color-cloud-back);
  transition: transform 0.3s ease;
}
html.dark .theme-toggle__container .theme-toggle__clouds { transform: translateY(3em); }

/* ========================
   LAYOUT
   ======================== */
#app {
  width: 100%; height: 100%;
  position: relative;
  display: flex;
  align-items: center;
}

/* Graph */
#graph-bg {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  right: 0;
  pointer-events: none;
}
#graph-canvas {
  width: 100%; height: 100%;
}

/* ========================
   ACCORDION CONTAINER
   ======================== */
#accordion {
  display: flex;
  flex-direction: row;
  gap: var(--gap);
  height: 85%;
  position: absolute;
  right: 20px;
  left: 20px;
  z-index: 10;
  justify-content: flex-end;
  box-sizing: border-box;
}

/* ========================
   PANEL
   ======================== */
.panel {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  width: 62px;
  flex-shrink: 0;
  flex-grow: 0;
  transition: var(--transition);
  background-size: cover;
  background-position: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.12);
}

.panel.active {
  flex-grow: 1;
  width: auto;
  max-width: 65vw;
  cursor: default;
}

/* Photo stays as background — always visible */
/* Frosted layer — inset 10px, anchored left */
.frost {
  position: absolute;
  top: var(--edge);
  left: var(--edge);
  bottom: var(--edge);
  right: var(--edge);
  border-radius: calc(var(--radius) - var(--edge));
  background: var(--frost-bg);
  backdrop-filter: blur(18px) saturate(0.85);
  -webkit-backdrop-filter: blur(18px) saturate(0.85);
  border: 1px solid var(--frost-border);
  overflow: hidden;
  transition: var(--transition);
  /* Hidden when collapsed */
  opacity: 0;
  pointer-events: none;
}

/* When active — frost covers panel leaving only right photo strip */
.panel.active .frost {
  opacity: 1;
  pointer-events: all;
  right: 18%;
}

/* Icon — bottom center when collapsed */
.panel-icon {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.22);
  border: 1px solid rgba(255,255,255,0.5);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  transition: var(--transition);
  z-index: 5;
  opacity: 1;
  backdrop-filter: blur(8px);
}

.panel.active .panel-icon {
  opacity: 0;
  pointer-events: none;
}

/* Content inside frost */
.panel-content {
  position: absolute;
  inset: 0;
  padding: 20px 18px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.1) transparent;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.panel.active .panel-content {
  opacity: 1;
  pointer-events: all;
  transition-delay: 0.28s;
}

/* Sub-sections within each panel */
.sub {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  padding: 12px 0;
  min-height: 48px;
  cursor: pointer;
  transition: flex 0.35s ease;
}
.sub:last-child { border-bottom: none; }
.sub.sub-active { flex: 8; cursor: default; }

html.dark .sub { border-bottom-color: rgba(255,255,255,0.07); }

.sub-label {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
  flex-shrink: 0;
}
html.dark .sub-label { color: rgba(200,190,170,0.6); font-weight: 300; }
html.dark .sub-body { color: rgba(230,220,200,0.85); }

.sub-body {
  flex: 1;
  overflow-y: auto;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  scrollbar-width: none;
}
.sub.sub-active .sub-body {
  opacity: 1;
  pointer-events: all;
  transition-delay: 0.15s;
}

/* ========================
   FORM ELEMENTS
   ======================== */
.field {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(0,0,0,0.15);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 6px 0;
  outline: none;
  caret-color: var(--accent);
}
html.dark .field { border-bottom-color: rgba(255,255,255,0.12); }
.field::placeholder { color: var(--text-dimmer); }

textarea.field { resize: none; height: 60px; font-family: var(--font-body); font-size: 0.75rem; line-height: 1.6; }

.btn {
  background: transparent;
  border: 1px solid rgba(0,0,0,0.15);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.56rem;
  letter-spacing: 0.1em;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  margin-top: 6px;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
html.dark .btn { border-color: rgba(255,255,255,0.12); }

/* Hazel messages */
.msg { display: flex; flex-direction: column; max-width: 90%; margin-bottom: 8px; }
.msg.user { align-self: flex-end; }
.msg.assistant { align-self: flex-start; }
.msg-bubble {
  font-family: var(--font-body);
  font-size: 0.75rem;
  line-height: 1.65;
  padding: 7px 11px;
  border-radius: 8px;
}
.msg.user .msg-bubble { background: rgba(45,90,61,0.12); border: 1px solid rgba(45,90,61,0.2); color: var(--accent); }
.msg.assistant .msg-bubble { background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.08); color: var(--text); }
html.dark .msg.assistant .msg-bubble { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); }
.msg-thinking { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-dimmer); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

#hazel-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; scrollbar-width: none; margin-bottom: 8px; }
.hazel-row { display: flex; gap: 5px; flex-shrink: 0; }
#hazel-input { flex:1; background: rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 0.68rem; padding: 6px 9px; outline: none; caret-color: var(--accent); }
html.dark #hazel-input { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
#hazel-input::placeholder { color: var(--text-dimmer); }
#hazel-send { background: transparent; border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; color: var(--text-dimmer); font-family: var(--font-mono); font-size: 0.65rem; padding: 6px 10px; cursor: pointer; }
html.dark #hazel-send { border-color: rgba(255,255,255,0.1); }

/* Task items */
.task-item { display: flex; align-items: center; gap: 7px; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.07); font-family: var(--font-body); font-size: 0.75rem; color: var(--text-dim); cursor: pointer; }
.task-item::before { content: '◦'; color: var(--text-dimmer); font-size: 0.8rem; }
.task-item.done { text-decoration: line-through; opacity: 0.4; }
.task-item.done::before { content: '✓'; color: var(--accent); }

/* Note / paper items */
.list-item { padding: 7px 0; border-bottom: 1px solid rgba(0,0,0,0.07); cursor: pointer; }
.list-item:last-child { border-bottom: none; }
.list-item-title { font-family: var(--font-body); font-size: 0.78rem; color: var(--text); line-height: 1.4; }
.list-item-meta { font-family: var(--font-mono); font-size: 0.52rem; color: var(--text-dimmer); margin-top: 2px; letter-spacing: 0.06em; }
.list-item-link { font-family: var(--font-mono); font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); text-decoration: none; display: inline-block; margin-top: 3px; opacity: 0.8; }

/* Lex entry */
.lex-term { font-family: var(--font-serif); font-size: 0.88rem; color: var(--accent); }
.lex-def { font-family: var(--font-body); font-size: 0.7rem; color: var(--text-dim); font-style: italic; line-height: 1.5; margin-top: 2px; }

/* Weather */
.weather-big { font-family: var(--font-serif); font-size: 2.4rem; color: var(--text); line-height: 1; }
.weather-sub { font-family: var(--font-body); font-size: 0.8rem; color: var(--text-dim); font-style: italic; margin-top: 4px; }
.weather-detail { font-family: var(--font-mono); font-size: 0.55rem; color: var(--text-dimmer); letter-spacing: 0.08em; margin-top: 6px; }
.moon-line { display: flex; align-items: center; gap: 7px; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.08); }

/* Add lex form */
#add-lex { display: none; flex-direction: column; gap: 5px; margin-top: 8px; }
#add-lex.open { display: flex; }
</style>
</head>

<div id="app">

  <!-- Graph -->
  <div id="graph-bg">
    <canvas id="graph-canvas"></canvas>
  </div>

  <!-- Accordion -->

<script>
const SUPABASE_URL = 'https://gvfcygdfjimmsrjakodo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sVgHLp9Kh_xeDuBqGWegow_lamYMIF2';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Theme
const themeBtn = document.getElementById('theme-toggle-btn');
try { if (localStorage.getItem('app-theme')==='dark') document.documentElement.classList.add('dark'); } catch(e){}
function updateTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
  themeBtn.setAttribute('aria-checked', dark);
  try { localStorage.setItem('app-theme', dark?'dark':'light'); } catch(e){}
}
themeBtn.addEventListener('click', () => updateTheme(!document.documentElement.classList.contains('dark')));

// Graph
(function() {
  const canvas = document.getElementById('graph-canvas');
  const ctx = canvas.getContext('2d');
  let nodes=[], edges=[], W, H;
  function resize() {
    const el = document.getElementById('graph-bg');
    W = canvas.width = el.offsetWidth;
    H = canvas.height = el.offsetHeight;
  }
  function init() {
    nodes=[]; edges=[];
    for(let i=0;i<22;i++) nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1.2,pulse:Math.random()*Math.PI*2,t:Math.random()>.65?'v':'a'});
    for(let i=0;i<22;i++) for(let j=i+1;j<22;j++) if(Math.random()<.09) edges.push([i,j]);
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    const dark = document.documentElement.classList.contains('dark');
    edges.forEach(([a,b])=>{
      const na=nodes[a],nb=nodes[b];
      const dist=Math.hypot(na.x-nb.x,na.y-nb.y);
      const alpha=Math.max(0,1-dist/250)*(dark?.14:.1);
      ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(nb.x,nb.y);
      ctx.strokeStyle=dark?`rgba(195,158,80,${alpha})`:`rgba(45,90,61,${alpha})`;
      ctx.lineWidth=0.6;ctx.stroke();
    });
    nodes.forEach(n=>{
      n.pulse+=.016;
      const g=Math.sin(n.pulse)*.5+.5;
      const ca=n.t==='a'?(dark?'195,158,80':'45,90,61'):(dark?'90,155,120':'26,61,79');
      if(g>.2){
        const gr=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*(5+g*4));
        gr.addColorStop(0,`rgba(${ca},${g*.1})`);gr.addColorStop(1,`rgba(${ca},0)`);
        ctx.beginPath();ctx.arc(n.x,n.y,n.r*(5+g*4),0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
      }
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${ca},${.3+g*.4})`;ctx.fill();
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();init();});
  resize();init();draw();
})();

// Accordion — panels (toggle, max 2 open, all can close)
function activatePanel(id, e) {
  if (e) e.stopPropagation();
  const panel = document.getElementById(id);
  if (panel.classList.contains('active')) {
    panel.classList.remove('active');
    return;
  }
  const active = document.querySelectorAll('.panel.active');
  if (active.length >= 2) active[0].classList.remove('active');
  panel.classList.add('active');
}

// Accordion — sub-sections
function activateSub(el, e) {
  if (e) e.stopPropagation();
  const subs = el.closest('.panel-content').querySelectorAll('.sub');
  subs.forEach(s => s.classList.remove('sub-active'));
  el.classList.add('sub-active');
}

// Hazel
let chatHistory = [];
function appendMsg(role, text) {
  const msgs = document.getElementById('hazel-messages');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="msg-bubble">${text}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  chatHistory.push({role, content: text});
}
async function getCtx(q) {
  let ctx='';
  const [{data:n},{data:p},{data:t}] = await Promise.all([
    db.from('notes').select('title,content').ilike('title',`%${q}%`).limit(2),
    db.from('papers').select('title,abstract').ilike('title',`%${q}%`).limit(2),
    db.from('terms').select('term,definition').ilike('term',`%${q}%`).limit(2),
  ]);
  if(n?.length) ctx+=`\n\nNOTES:\n`+n.map(x=>`[${x.title}] ${x.content?.slice(0,300)}`).join('\n');
  if(p?.length) ctx+=`\n\nPAPERS:\n`+p.map(x=>`[${x.title}] ${x.abstract?.slice(0,250)}`).join('\n');
  if(t?.length) ctx+=`\n\nLEXICON:\n`+t.map(x=>`[${x.term}] ${x.definition}`).join('\n');
  return ctx;
}
async function sendHazel() {
  const inp = document.getElementById('hazel-input');
  const q = inp.value.trim(); if(!q) return;
  inp.value=''; appendMsg('user',q);
  const msgs = document.getElementById('hazel-messages');
  const th = document.createElement('div');
  th.className='msg assistant';
  th.innerHTML='<div class="msg-thinking">...</div>';
  msgs.appendChild(th); msgs.scrollTop=msgs.scrollHeight;
  const ctx = await getCtx(q);
  const system=`You are Hazel, research assistant for C. S. Rowe, incoming PhD in Cognitive and Information Sciences at UC Merced. DANs, astrocyte coupling, VEDA. Be terse and precise.${ctx?'\n\nContext:'+ctx:''}`;
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/hazel`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system,messages:chatHistory.filter(m=>m.role!=='system').slice(-10)})});
    const data = await res.json();
    th.remove(); appendMsg('assistant', data?.content?.[0]?.text||data?.error?.message||'no response');
  } catch(e) { th.remove(); appendMsg('assistant','connection error'); }
}
appendMsg('assistant', "Hey, nerd. What's up?");

// Tasks
let tasks = JSON.parse(localStorage.getItem('tasks-v2')||'[]');
function saveTasks() { localStorage.setItem('tasks-v2',JSON.stringify(tasks)); renderTasks(); }
function renderTasks() {
  const el = document.getElementById('task-list'); if(!el) return;
  el.innerHTML = tasks.map((t,i)=>`<div class="task-item ${t.done?'done':''}" onclick="toggleTask(${i})" ondblclick="deleteTask(${i})">${t.text}</div>`).join('')||'<div style="font-family:var(--font-body);font-size:0.72rem;color:var(--text-dimmer);font-style:italic">no tasks</div>';
}
function addTask(e) { if(e.key!=='Enter') return; const v=e.target.value.trim(); if(!v) return; tasks.unshift({text:v,done:false}); saveTasks(); e.target.value=''; }
function toggleTask(i) { tasks[i].done=!tasks[i].done; saveTasks(); }
function deleteTask(i) { tasks.splice(i,1); saveTasks(); }
renderTasks();

// Notes
async function searchNotes(q) {
  const el=document.getElementById('note-results'); if(!q){el.innerHTML='';return;}
  const {data}=await db.from('notes').select('title,path').ilike('title',`%${q}%`).limit(6);
  el.innerHTML=(data||[]).map(n=>`<div class="list-item"><div class="list-item-title">${n.title}</div><div class="list-item-meta">${n.path||''}</div></div>`).join('')||'<div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dimmer)">none found</div>';
}
function toggleNewNote(e) { e.stopPropagation(); const f=document.getElementById('new-note-form'); f.style.display=f.style.display==='flex'?'none':'flex'; }
async function saveNewNote() {
  const title=document.getElementById('nn-title').value.trim();
  const content=document.getElementById('nn-body').value.trim();
  if(!title) return;
  await db.from('notes').insert({title,content,path:`Notes/${title}.md`,tags:[],updated_at:new Date().toISOString()});
  document.getElementById('nn-title').value='';document.getElementById('nn-body').value='';
  document.getElementById('new-note-form').style.display='none';
}

// Lexicon
async function searchLex(q) {
  const el=document.getElementById('lex-results');
  if(!q){el.innerHTML='';return;}
  const [{data:tm},{data:dm}]=await Promise.all([
    db.from('terms').select('term,definition').ilike('term',`${q}%`).limit(5),
    db.from('terms').select('term,definition').ilike('definition',`%${q}%`).limit(5),
  ]);
  const seen=new Set((tm||[]).map(t=>t.term));
  const merged=[...(tm||[]),...(dm||[]).filter(t=>!seen.has(t.term))].slice(0,8);
  el.innerHTML=merged.map(t=>`<div style="padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.07)"><div class="lex-term">${t.term}</div><div class="lex-def">${t.definition}</div></div>`).join('')||'<div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dimmer)">none found</div>';
}
function toggleAddLex(e) { e.stopPropagation(); document.getElementById('add-lex').classList.toggle('open'); }
async function addLex() {
  const term=document.getElementById('lex-term').value.trim();
  const def=document.getElementById('lex-def').value.trim();
  const etym=document.getElementById('lex-etym').value.trim();
  const st=document.getElementById('lex-status');
  if(!term||!def){st.textContent='term + def required';return;}
  const {error}=await db.from('terms').insert({term,definition:def,etymology:etym||null,date_added:new Date().toISOString().split('T')[0]});
  if(error){st.textContent='error';return;}
  st.textContent='added ✓';
  ['lex-term','lex-etym','lex-def'].forEach(id=>document.getElementById(id).value='');
  setTimeout(()=>st.textContent='',2500);
}

// Weather
async function loadWeather() {
  try {
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.8021&longitude=-124.1637&current=temperature_2m,weathercode,windspeed_10m,relative_humidity_2m&temperature_unit=fahrenheit&windspeed_unit=mph');
    const d=await r.json(); const c=d.current;
    const desc={0:'clear sky',1:'mainly clear',2:'partly cloudy',3:'overcast',45:'fog',51:'light drizzle',61:'light rain',63:'rain',65:'heavy rain',80:'showers',95:'thunderstorm'};
    document.getElementById('w-temp').textContent=Math.round(c.temperature_2m)+'°F';
    document.getElementById('w-desc').textContent=desc[c.weathercode]||'variable';
    document.getElementById('w-detail').textContent=`wind ${Math.round(c.windspeed_10m)}mph · humidity ${c.relative_humidity_2m}%`;
    const moon=getMoon();
    document.getElementById('w-moon').textContent=moon.emoji;
    document.getElementById('w-moon-name').textContent=moon.name;
  } catch(e){}
}
function getMoon() {
  const known=new Date(2000,0,6,18,14,0),syn=29.530588853;
  const pct=(((new Date()-known)/(1000*60*60*24))%syn+syn)%syn/syn;
  const p=[{name:'New Moon',emoji:'🌑',min:0,max:.0625},{name:'Waxing Crescent',emoji:'🌒',min:.0625,max:.1875},{name:'First Quarter',emoji:'🌓',min:.1875,max:.3125},{name:'Waxing Gibbous',emoji:'🌔',min:.3125,max:.4375},{name:'Full Moon',emoji:'🌕',min:.4375,max:.5625},{name:'Waning Gibbous',emoji:'🌖',min:.5625,max:.6875},{name:'Last Quarter',emoji:'🌗',min:.6875,max:.8125},{name:'Waning Crescent',emoji:'🌘',min:.8125,max:1}];
  return p.find(x=>pct>=x.min&&pct<x.max)||p[0];
}
loadWeather();

// Papers
async function searchPapers(q) {
  const el=document.getElementById('paper-results');
  const qr=q?db.from('papers').select('*').or(`title.ilike.%${q}%,abstract.ilike.%${q}%`).limit(8):db.from('papers').select('*').order('year',{ascending:false}).limit(8);
  const {data}=await qr;
  el.innerHTML=(data||[]).map(p=>`<div class="list-item"><div class="list-item-title">${p.title}</div><div class="list-item-meta">${(p.authors||[]).join(', ')}${p.year?' · '+p.year:''}</div><a href="reading_room.html?key=${p.zotero_key}" class="list-item-link">open in reading room →</a></div>`).join('');
}
searchPapers('');

// Open paper inline
function openPaper(i) {
  const p = window._papers[i];
  if (!p) return;
  const el = document.getElementById('paper-results');
  el.innerHTML = `
    <div style="margin-bottom:10px">
      <button class="btn" onclick="searchPapers('');event.stopPropagation()">← back</button>
    </div>
    <div style="font-family:var(--font-serif);font-size:1.1rem;color:var(--text);line-height:1.4;margin-bottom:8px">${p.title}</div>
    <div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dimmer);letter-spacing:0.08em;margin-bottom:16px">${(p.authors||[]).join(', ')}${p.year?' · '+p.year:''}</div>
    ${p.abstract ? `<div style="font-family:var(--font-body);font-size:0.8rem;color:var(--text-dim);line-height:1.8;font-style:italic;margin-bottom:16px">${p.abstract}</div>` : ''}
    ${p.doi ? `<a href="https://doi.org/${p.doi}" target="_blank" style="font-family:var(--font-mono);font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);text-decoration:none">open paper →</a>` : ''}
  `;
}
